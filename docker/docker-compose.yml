services:
  postgres:
    container_name: postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sensorsentinel
      POSTGRES_USER: sensorsentinel
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sensorsentinel"]
      interval: 10s
      timeout: 5s
      retries: 5

  nocodb:
    container_name: nocodb
    image: nocodb/nocodb:0.301.3
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NC_DB: "pg://postgres:5432?u=sensorsentinel&p=${DB_PASSWORD}&d=nocodb_meta"
    volumes:
      - ./nocodb/data:/usr/app/data
    ports:
      - "8090:8080"                   # NocoDB web UI

  mosquitto:
    container_name: mosquitto
    image: eclipse-mosquitto:2
    restart: unless-stopped
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    ports:
      - "1883:1883"                   # MQTT
      - "9001:9001"                   # WebSockets

  nocodb-init:
    container_name: nocodb-init
    image: alpine:3.19
    restart: "no"
    depends_on:
      - nocodb
    environment:
      NOCODB_ADMIN_EMAIL: ${NOCODB_ADMIN_EMAIL}
      NOCODB_ADMIN_PASSWORD: ${NOCODB_ADMIN_PASSWORD}
      DB_PASSWORD: ${DB_PASSWORD}
    command: >
      sh -c "apk add --no-cache curl jq postgresql15-client > /dev/null 2>&1 && sh /init.sh"
    volumes:
      - ./nocodb-init/init.sh:/init.sh:ro

  grafana:
    container_name: grafana
    image: grafana/grafana:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./grafana/data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"                   # Grafana web UI
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"

  nodered:
    container_name: nodered
    image: nodered/node-red:latest
    restart: unless-stopped
    depends_on:
      - mosquitto
      - postgres
    volumes:
      - ./nodered/data:/data
    ports:
      - "1880:1880"                   # Node-RED web UI
    environment:
      TZ: Australia/Sydney
      DB_PASSWORD: ${DB_PASSWORD}
      NOTIFY_EMAIL_USER: ${NOTIFY_EMAIL_USER}
      NOTIFY_EMAIL_PASS: ${NOTIFY_EMAIL_PASS}
